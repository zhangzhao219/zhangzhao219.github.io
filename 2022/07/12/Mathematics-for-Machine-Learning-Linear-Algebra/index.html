# 开始学习

总是觉得自己数学有一点差，可能是因为上大学学习的时候题目做的比较少，我的脑子又不太灵光，因此一直不能很好的理解数学相关的一些公式、定理等，平时编程的时候尽量找简单的方法绕开复杂的数学公式。假期有时间了，试一下帝国理工的线性代数课程，注重记录，注重理解。这也是第一次看没有中文字幕的全英文课。加油！

# 课程简介

In this course on Linear Algebra we look at what linear algebra is and how it relates to vectors and matrices. Then we look through what vectors and matrices are and how to work with them, including the knotty problem of eigenvalues and eigenvectors, and how to use these to solve problems. Finally  we look at how to use these to do fun things with datasets - like how to rotate images of faces and how to extract eigenvectors to look at how the Pagerank algorithm works.

Since we're aiming at data-driven applications, we'll be implementing some of these ideas in code, not just on pencil and paper. Towards the end of the course, you'll write code blocks and encounter Jupyter notebooks in Python, but don't worry, these will be quite short, focussed on the concepts, and will guide you through if you’ve not coded before.

At the end of this course you will have an intuitive understanding of vectors and matrices that will help you bridge the gap into linear algebra problems, and how to apply these concepts to machine learning.

# 为什么我们需要线性代数？

1. 让计算机快速求解多元方程组
   例如：多元方程组$\left\{\begin{array}{c}2a+3b=8\\10a+1b=13\end{array}\right.$，可以转换为$\left(\begin{array}{cc}2&3\\10&1\end{array}\right)\left[\begin{array}{c}a\\b\end{array}\right]=\left[\begin{array}{c}8 \\ 13\end{array}\right]$，然后进行求解。
2. 为数据拟合方程
   随着神经网络和机器学习的发展，并不仅仅是拟合方程，最好还能在已有方程曲线的前提下，找到最佳的拟合参数，从而更适用于当前的数据。描述一个方程的各种参数可以使用一个向量来表示，我们希望通过某种方式，数据科学或者机器学习的方式来找到最佳的拟合参数。

# 向量(Vector)

**在计算机科学中，向量被认为是描述一个物体的属性的集合。**

## 向量的基本操作

向量有两种操作：向量与向量之间的加法，以及向量与标量之间的乘法。

向量与向量之间的加法满足结合律(associativity)。

向量与标量之间的乘法，要将标量与向量中的每一个属性相乘

## 向量的其他运算

如果不以坐标系的角度去观察向量，那么一个向量由两个属性构成：**向量的方向和向量的模长**

向量的模长指的是向量各组成成分的平方和开根号

向量的点乘指的是向量对应位置的数值相乘之和，满足交换律（commutative）

同时满足向量的加法分配律（distributive over addition），即$\vec{r}\cdot(\vec{s}+\vec{t})=\vec{r}\cdot\vec{s}+\vec{r}\cdot\vec{t}$

向量与标量相乘满足结合律和交换律，即$\vec{r}\cdot(a\cdot\vec{s})=a\cdot(\vec{r}\cdot\vec{s})$

向量模长与点乘之间的关系：向量自身的点乘与模长的平方相等，即 $\vec{r}\cdot\vec{r}=|\vec{r}|^2$

向量的余弦定理：$\cos{\theta}=\frac {\vec{r}\cdot\vec{s}} {|\vec{r}|\cdot|\vec{s}|}$

向量投影（projection）：

$\vec{s}$到$\vec{r}$上的投影标量（scalar projection）= $\frac{\vec{r}\cdot\vec{s}} {|\vec{r}|}$

$\vec{s}$到$\vec{r}$上的投影向量（vector projection）= scalar projection *  $\vec{r}$单位向量 = $\frac{\vec{r}\cdot\vec{s}} {|\vec{r}|}\cdot\frac{\vec{r}}{|\vec{r}|}$

向量投影是一个标量，但是，如果需要投影向量的方向，直接与被投影的单位向量相乘即可。

## 向量的坐标系

两个不共线的向量可以确定一个坐标系(coordinate system)。要描述一个向量，首先要定义一个坐标系，决定坐标系的是**基向量**。

基向量是$n$维的向量集合，需要满足3个条件：

1. $n$维的向量彼此之间不线性相关，也就是线性独立的$n$维向量。
2. 可以扩展到整个空间。
3. 空间是$n$维的。

虽然并不要求基向量正交，但是如果它们正交，会为解决数学问题带来很大的方便。

如果二维的**基向量互相垂直**，转换坐标系只需将向量投影到转换后的基向量，计算数值即可。

设原始坐标系$\vec{e_1}=\left[\begin{array}{c}1\\0\end{array}\right]$，$\vec{e_2}=\left[\begin{array}{c}0\\1\end{array}\right]$，转换后的基向量$\vec{b_1}=\left[\begin{array}{c}2\\1\end{array}\right]$，$\vec{b_2}=\left[\begin{array}{c}-2\\4\end{array}\right]$

首先验证$\vec{b_1}$与$\vec{b_2}$是否垂直，$\cos{\theta}=\frac {\vec{b_1}\cdot\vec{b_2}} {|\vec{b_1}|\cdot|\vec{b_2}|}=0$

然后将待转换的向量$r_e=3\vec{e_1}+4\vec{e_2}=\left[\begin{array}{c}3\\4\end{array}\right]$，对$\vec{b_1}$的投影为$\frac{\vec{r_e}\cdot\vec{b_1}}{|\vec{b_1}|}$，这个投影除以$\vec{b_1}$的模长$\frac{\vec{r_e}\cdot\vec{b_1}}{|\vec{b_1}|}\cdot\frac{1}{|\vec{b_1}|}=\frac{3*2+4*1}{2^2+1^2}=2$，即$\vec{r_e}$在$\vec{b_1}$方向的投影为2个$|\vec{b_1}|$长度。同理，即$\vec{r_e}$在$\vec{b_2}$方向的投影为0.5个$|\vec{b_2}|$长度。

从而得出$\vec{r_e}=2\vec{b_1}+\frac{1}{2}\vec{b_2}$，最终计算得$r_b=\left[\begin{array}{c}2\\\frac{1}{2}\end{array}\right]$。

**找到一个合适的坐标系，帮助我们解决数学问题，是非常重要的。**
